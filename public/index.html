<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ShortLink Pro ✨ | URL Shortener</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-icon">🔗</span>
                <span class="logo-text">ShortLink Pro</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/" class="active">Home</a></li>
                <li><a href="/dashboard.html">Dashboard</a></li>
                <li><a href="/features.html">Features</a></li>
                <li><a href="/about.html">About</a></li>
            </ul>
            <div class="nav-toggle">☰</div>
        </div>
    </nav>

    <!-- Main Shortener -->
    <section class="shortener-section">
        <div class="container">
            <h1>Shorten Your URLs <span class="gradient-text">Instantly</span></h1>
            <p class="subtitle">Create short, trackable links in seconds.</p>

            <div class="shortener-card">
                <form id="shorten-form">
                    <div class="form-group">
                        <label for="longUrl">Long URL</label>
                        <input
                            type="url"
                            id="longUrl"
                            name="longUrl"
                            placeholder="https://example.com/your-long-url"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label for="customCode">Custom Code (optional)</label>
                        <input
                            type="text"
                            id="customCode"
                            name="customCode"
                            placeholder="my-custom-link"
                        />
                    </div>

                    <button type="submit" class="btn btn-primary">🔗 Shorten URL</button>
                </form>

                <!-- Result -->
                <div id="result"></div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('shorten-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const longUrl = document.getElementById('longUrl').value.trim();
            const customCode = document.getElementById('customCode').value.trim();
            const resultDiv = document.getElementById('result');

            if (!longUrl) {
                resultDiv.innerHTML = `
                    <div class="alert alert-error">❌ Please enter a valid URL</div>
                `;
                return;
            }

            resultDiv.innerHTML = `
                <div class="alert alert-loading">⏳ Creating your short link...</div>
            `;

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        longUrl: longUrl,
                        customCode: customCode || undefined
                    })
                });

                const data = await res.json();

                if (data.success) {
                    const base = window.location.origin;
                    const short = `${base}/${data.shortCode}`;

                    resultDiv.innerHTML = `
                        <div class="alert alert-success">
                            <strong>✅ Success!</strong><br />
                            <strong>Short URL:</strong><br />
                            <a href="${short}" target="_blank">${short}</a><br />
                            <strong>Code:</strong> <code>${data.shortCode}</code><br /><br />
                            <button onclick="navigator.clipboard.writeText('${short}')" class="btn btn-sm btn-copy">📋 Copy</button>
                            <button onclick="window.open('${short}','_blank')" class="btn btn-sm btn-test">🔗 Test</button>
                        </div>
                    `;

                    document.getElementById('longUrl').value = '';
                    document.getElementById('customCode').value = '';
                } else {
                    resultDiv.innerHTML = `
                        <div class="alert alert-error">❌ ${data.error || 'Something went wrong'}</div>
                    `;
                }
            } catch (err) {
                resultDiv.innerHTML = `
                    <div class="alert alert-error">❌ Network error. Please try again.</div>
                `;
                console.error(err);
            }
        });
    </script>

</body>
</html>
